    <body>
        <h1 id="title">welcome to my warmalade!</h1>
        <label for="weather">Select the weather type today: </label>

        </select>

        <p id="weather-comment"></p>

        <div class="contents">
            <div class="main-container">

                    <a href="./about.html">

                    </a>
                </div>
                <div class="icon">

                <div class="icon">
                    <a href="./shelf.html">
                        <img src="icons/shelf.png" class="icon" width="40">

                    </a>
                </div>
                <div class="icon">
                    <a href="./photo-album.html">
                        <img src="icons/photo-album.png" class="icon">
                        <p class="icon-text">photo album</p>
                    </a>
                </div>
            </div>
            <div id="gumball-machine">
                <img id="gumball" src="./icons/gumball-machine.png">

        <script src="./js/hidden-index.js"></script>
